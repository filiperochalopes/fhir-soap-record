services:
  fhir-soap-record-db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-fhir_soap_record}
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-clinic}
      MYSQL_USER: ${DB_USER:-clinic}
      MYSQL_PASSWORD: ${DB_PASS:-clinic}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS:-clinic}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  fhir-soap-record:
    build:
      context: .
      target: deps
    depends_on:
      fhir-soap-record-db:
        condition: service_healthy
    command: sh ./scripts/dev-with-prisma.sh
    # Load the full app config (S3, plugin key, MeuExame, etc.) so the dev-only
    # invocation `docker compose -f compose.dev.yml up` is self-sufficient.
    env_file:
      - .env
    # The plugin (MeuExame) calls happen server-side from inside this container.
    # `meuexame.localhost` otherwise resolves to the container's own loopback
    # (glibc maps *.localhost -> 127.0.0.1/::1), so the fetch never reaches the
    # host's reverse proxy. Point the hostname at the Docker Desktop host gateway
    # (IPv4 — the `host-gateway` token resolves to an unreachable IPv6 ULA here)
    # so the request hits nginx-proxy-manager on the host, which routes by Host
    # header to the meuexame stack.
    extra_hosts:
      - "meuexame.localhost:192.168.65.254"
    networks:
      - default
      - development
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # In the dev stack the app runs in a container, so localhost is the app
      # container itself. Always point Prisma at the bundled MySQL service.
      DATABASE_URL: mysql://${DB_USER:-clinic}:${DB_PASS:-clinic}@fhir-soap-record-db:3306/${DB_NAME:-fhir_soap_record}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data:

networks:
  default:
  development:
    external: true
