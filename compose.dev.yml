services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-fhir_soap_record}
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-clinic}
      MYSQL_USER: ${DB_USER:-clinic}
      MYSQL_PASSWORD: ${DB_PASS:-clinic}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS:-clinic}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      target: deps
    depends_on:
      db:
        condition: service_healthy
    command: sh ./scripts/dev-with-prisma.sh
    environment:
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: ${DATABASE_URL:-mysql://${DB_USER:-clinic}:${DB_PASS:-clinic}@db:3306/${DB_NAME:-fhir_soap_record}}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data:
