services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-fhir_soap_record}
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-clinic}
      MYSQL_USER: ${DB_USER:-clinic}
      MYSQL_PASSWORD: ${DB_PASS:-clinic}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS:-clinic}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./data/db:/var/lib/mysql

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://${DB_USER:-clinic}:${DB_PASS:-clinic}@db:3306/${DB_NAME:-fhir_soap_record}}
      APP_URL: http://localhost:3000
      API_DRY_RUN: ${API_DRY_RUN:-false}
      COOKIE_NAME: clinic_token
      PORT: 3000
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      LLM_TOKEN: ${LLM_TOKEN:-}
      MCP_CALC_URL: ${MCP_CALC_URL:-http://beta.calc.filipelopes.med.br/mcp}
      MEUEXAME_API_BASE_URL: ${MEUEXAME_API_BASE_URL:-}
      PLUGIN_SECRET_ENCRYPTION_KEY: ${PLUGIN_SECRET_ENCRYPTION_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    ports:
      - "${APP_PORT:-3000}:3000"
