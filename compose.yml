services:
  fhir-soap-record-db:
    image: mysql:8.4
    container_name: fhir-soap-record-db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - data
    environment:
      MYSQL_DATABASE: ${DB_NAME:-fhir_soap_record}
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-clinic}
      MYSQL_USER: ${DB_USER:-clinic}
      MYSQL_PASSWORD: ${DB_PASS:-clinic}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS:-clinic}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./data/db:/var/lib/mysql

  fhir-soap-record:
    build:
      context: .
    container_name: fhir-soap-record
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - proxy
      - internal
      - data
    depends_on:
      fhir-soap-record-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://${DB_USER:-clinic}:${DB_PASS:-clinic}@fhir-soap-record-db:3306/${DB_NAME:-fhir_soap_record}}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_DRY_RUN: ${API_DRY_RUN:-false}
      COOKIE_NAME: clinic_token
      PORT: 3000
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      LLM_TOKEN: ${LLM_TOKEN:-}
      MCP_CALC_URL: ${MCP_CALC_URL:-http://beta.calc.filipelopes.med.br/mcp}
      MEUEXAME_API_BASE_URL: ${MEUEXAME_API_BASE_URL:-}
      DOCS_APP_BASE_URL: ${DOCS_APP_BASE_URL:-}
      DOCS_WEBHOOK_BASE_URL: ${DOCS_WEBHOOK_BASE_URL:-}
      PLUGIN_SECRET_ENCRYPTION_KEY: ${PLUGIN_SECRET_ENCRYPTION_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    ports:
      - "${APP_PORT:-3000}:3000"

networks:
  proxy:
    external: true
  internal:
    external: true
  data:
    external: true
